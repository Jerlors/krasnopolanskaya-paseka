<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина | Краснополянская пасека</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/reset.css"><link rel="stylesheet" href="css/layout.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <header class="site-header">
  <div class="container header-inner">
    <!-- Логотип -->
    <a href="index.html" class="logo">
      <img src="img/logo/logo.svg" alt="Краснополянская пасека" class="logo-img">
      <span class="logo-text">Краснополянская<br>пасека</span>
    </a>
    
    <!-- Десктопное меню (только на ПК) -->
    <nav class="desktop-nav desktop-only">
      <a href="index.html">Главная</a>
      <a href="catalog.html">Каталог</a>
      <a href="about.html">О пасеке</a>
      <a href="delivery.html">Доставка</a>
      <a href="contacts.html">Контакты</a>
    </nav>
    
    <!-- Корзина -->
    <button onclick="toggleDrawer()" style="position:relative;" class="mobile-only">
      🛒 <span class="cart-badge">0</span>
    </button>
    
    <!-- Корзина + меню на ПК -->
    <div class="desktop-only" style="display:flex;gap:16px;align-items:center;">
      <button onclick="toggleDrawer()" style="position:relative;">
        🛒 <span class="cart-badge">0</span>
      </button>
    </div>
  </div>
</header>
  <main class="container cart-layout" style="padding-top:calc(var(--header-height) + 32px);">
    <div class="card" style="margin-bottom:16px;">
      <h2 style="margin-bottom:16px;">Ваш заказ</h2>
      <div id="cart-items"></div>
    </div>
    <div class="card">
      <h2 style="margin-bottom:16px;">Оформление</h2>
      <form id="checkout-form" style="margin-bottom:16px;">
        <input type="text" placeholder="Имя и Фамилия" required>
        <input type="tel" placeholder="Телефон" required>
        <textarea placeholder="Адрес доставки" rows="2"></textarea>
      </form>
      <div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:18px;font-weight:700;">
        <span>Итого:</span> <span id="cart-total">0 ₽</span>
      </div>
      <button onclick="alert('Заказ отправлен! Менеджер свяжется в WhatsApp.')" class="btn btn-primary" style="width:100%;">Подтвердить заказ</button>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="index.html" class="nav-link">🏠<span>Главная</span></a>
    <a href="catalog.html" class="nav-link">🔍<span>Каталог</span></a>
    <a href="about.html" class="nav-link">👤<span>О нас</span></a>
    <a href="contacts.html" class="nav-link">📍<span>Контакты</span></a>
  </nav>
  <div class="drawer-overlay" id="cart-overlay" onclick="toggleDrawer()"></div>
  <aside class="drawer" id="cart-drawer"><div style="padding:16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;"><b>Корзина</b><button onclick="toggleDrawer()">✕</button></div><div id="cart-items" style="padding:16px;flex:1;overflow-y:auto;"></div><div style="padding:16px;border-top:1px solid #eee;background:#fff;"><a href="cart.html" class="btn btn-primary" style="width:100%;">Оформить заказ</a></div></aside>
  <div class="toast" id="toast"></div>
  <script src="js/app.js" type="module"></script>
</body>
</html>
